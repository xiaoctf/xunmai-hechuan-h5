<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="寻脉合川非遗文旅数字导览入口，自动识别移动端或桌面端。" />
    <title>寻脉合川：非遗文旅数字导览</title>
    <style>
      :root {
        --paper: #f7f1e5;
        --ink: #261d18;
        --muted: #725f52;
        --stone: #384743;
        --cinnabar: #b43d2d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(38, 29, 24, 0.035) 1px, transparent 1px) 0 0 / 28px 28px,
          linear-gradient(rgba(38, 29, 24, 0.03) 1px, transparent 1px) 0 0 / 28px 28px,
          radial-gradient(circle at 16% 18%, rgba(180, 61, 45, 0.15), transparent 24rem),
          radial-gradient(circle at 84% 80%, rgba(93, 141, 154, 0.2), transparent 24rem),
          var(--paper);
        font-family: "Noto Serif CJK SC", "Source Han Serif SC", "Songti SC", "SimSun", serif;
      }

      .gate {
        width: min(100%, 760px);
        padding: clamp(28px, 6vw, 64px);
        border: 1px solid rgba(38, 29, 24, 0.18);
        border-radius: 12px;
        background: rgba(255, 253, 247, 0.72);
        box-shadow: 0 24px 70px rgba(38, 29, 24, 0.14);
      }

      .eyebrow {
        width: fit-content;
        margin: 0 0 18px;
        padding: 6px 11px;
        border: 1px solid rgba(180, 61, 45, 0.34);
        border-radius: 999px;
        color: var(--cinnabar);
        font-size: 13px;
        font-weight: 800;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(42px, 9vw, 78px);
        line-height: 1.05;
        font-family: "STKaiti", "KaiTi", "FangSong", serif;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.85;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 800;
        color: inherit;
        text-decoration: none;
      }

      .primary {
        color: var(--paper);
        background: var(--stone);
      }

      .secondary {
        border: 1px solid rgba(38, 29, 24, 0.22);
        color: var(--muted);
        background: rgba(255, 253, 247, 0.62);
      }
    </style>
    <script>
      (() => {
        const hash = window.location.hash || "";
        const params = new URLSearchParams(window.location.search);
        const forced = params.get("view");
        const isMobile =
          forced === "mobile" ||
          (forced !== "desktop" &&
            (window.matchMedia("(max-width: 760px)").matches ||
              window.matchMedia("(pointer: coarse)").matches ||
              /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent)));
        const target = isMobile ? "mobile.html" : "desktop.html";
        window.location.replace(`${target}${hash}`);
      })();
    </script>
  </head>
  <body>
    <main class="gate">
      <p class="eyebrow">正在识别访问设备</p>
      <h1>寻脉合川</h1>
      <p>
        页面将自动进入适合当前设备的非遗文旅数字导览版本。若没有自动跳转，可手动选择移动端或桌面端。
      </p>
      <nav class="actions" aria-label="手动选择版本">
        <a class="primary" href="./mobile.html">进入移动端</a>
        <a class="secondary" href="./desktop.html">进入桌面端</a>
      </nav>
    </main>
  </body>
</html>
